<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusGravity</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Decorative background elements -->
  <div class="glow-orb top-orb"></div>
  <div class="glow-orb bottom-orb"></div>

  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10" stroke-dasharray="4 4"></circle>
            <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
          </svg>
        </div>
        <h1>FocusGravity</h1>
      </div>
      <div class="controls">
        <label class="focus-toggle">
          <span class="label-text">Focus Mode</span>
          <input type="checkbox" id="focusModeToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value"><span id="totalTabs">0</span></div>
        <div class="stat-label">Open Tabs</div>
      </div>
      <div class="stat stat-wasted">
        <div class="stat-value danger-text"><span id="lowPriorityTabs">0</span></div>
        <div class="stat-label">Wasted</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          High Priority (Keep)
        </h2>
      </div>
      <ul id="highPriorityList" class="tab-list"></ul>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          Smart Groups
        </h2>
      </div>
      <ul id="groupList" class="tab-list"></ul>
    </div>

    <div class="section danger-zone">
      <div class="section-header">
        <h2 class="danger-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          Suggestion to Close
        </h2>
        <button id="closeLowPriorityBtn" class="action-btn">Clean Up All</button>
      </div>
      <ul id="lowPriorityList" class="tab-list"></ul>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
